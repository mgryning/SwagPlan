<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reset Password - SwagPlan</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <div id="login-section">
            <div class="auth-shell">
                <div class="auth-intro">
                    <h1>Reset your password</h1>
                    <p id="reset-page-copy">Enter your email and we'll send you a reset link.</p>
                </div>

                <div id="auth-feedback"></div>

                <div class="auth-grid" style="grid-template-columns: minmax(0, 520px); justify-content: center;">
                    <section class="auth-card">
                        <form id="request-reset-form" class="auth-form">
                            <div class="form-group">
                                <label for="request-email">Email</label>
                                <input type="email" id="request-email" placeholder="you@example.com" required>
                            </div>
                            <button type="submit" class="btn btn-primary auth-submit-btn">Send reset link</button>
                        </form>

                        <form id="complete-reset-form" class="auth-form" style="display: none;">
                            <div class="form-group">
                                <label for="new-password">New password</label>
                                <input type="password" id="new-password" placeholder="Minimum 8 characters" minlength="8" required>
                            </div>
                            <div class="form-group">
                                <label for="confirm-password">Confirm password</label>
                                <input type="password" id="confirm-password" placeholder="Repeat your new password" minlength="8" required>
                            </div>
                            <button type="submit" class="btn btn-primary auth-submit-btn">Update password</button>
                        </form>

                        <div class="auth-links">
                            <a href="index.html">Back to sign in</a>
                        </div>
                    </section>
                </div>
            </div>
        </div>
    </div>

    <script src="auth-client.js"></script>
    <script src="forgot-password.js"></script>
</body>
</html>
